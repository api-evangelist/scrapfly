specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Scrapfly
providerId: scrapfly
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Web Scraping
  - Data Extraction
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps shape for Scrapfly — credit-based subscription with optional pay-as-you-go
  overflow. A single credit pool meters all products (Scrape, Cloud Browser, Screenshot, Extraction, Crawler).
  Per-request credit cost varies by enabled features (JS rendering, residential proxy, country targeting).
sources:
  - https://scrapfly.io/pricing
  - https://scrapfly.io/docs/scrape-api/getting-started
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Scrapfly Inc.
serviceCategory: Web Scraping / Data Extraction
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Scrapfly
  ServiceCategory: Web Scraping / Data Extraction
  ProviderName: Scrapfly
  PublisherName: Scrapfly Inc.
  InvoiceIssuerName: Scrapfly Inc.
  BillingCurrency: USD
meters:
  - name: subscription_fee
    description: Recurring monthly plan fee (Discovery, Pro, Startup, Enterprise, Custom)
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: scrape_credits
    description: Credits consumed per Scrape API request, varying by features enabled
    unit: credit
    aggregation: sum
    dimensions:
      - product
      - render_js
      - proxy_pool
      - country
  - name: cloud_browser_credits
    description: Credits consumed by Cloud Browser sessions
    unit: credit
    aggregation: sum
    dimensions:
      - product
      - session_duration
  - name: screenshot_credits
    description: Credits consumed by Screenshot API requests
    unit: credit
    aggregation: sum
    dimensions:
      - product
      - render_js
  - name: extraction_credits
    description: Credits consumed by Extraction API requests
    unit: credit
    aggregation: sum
    dimensions:
      - product
      - extraction_model
  - name: crawler_credits
    description: Credits consumed by Crawler API requests
    unit: credit
    aggregation: sum
    dimensions:
      - product
  - name: extra_credit_blocks
    description: Pay-as-you-go credit blocks billed when subscription credits are exhausted (Pro and above)
    unit: 10000-credit-block
    aggregation: sum
    dimensions:
      - plan
principles:
  - name: Visibility
    description: Inspect X-Scrapfly-Api-Cost on every response to attribute credit cost per call. Use
      the Scrapfly dashboard's usage analytics, the cost estimator, and per-project usage views to monitor
      consumption.
  - name: Allocation
    description: Use Scrapfly Projects to split credit consumption by application, team, or environment.
      Project-scoped concurrency and credit usage feed back via X-Scrapfly-Project-* headers.
  - name: Optimization
    description: Disable JS rendering and residential proxies when not required (each adds credit cost),
      cache successful responses, and right-size the plan against observed monthly credit burn. Use the
      pricing estimator to model feature toggles before changes.
  - name: Accountability
    description: Engineering owners of each Project hold accountability for their credit budget. Free
      and Discovery plans hard-cap at quota; Pro+ owners must monitor overflow billing to avoid surprise
      pay-as-you-go charges.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
