specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Scrapfly
providerId: scrapfly
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Web Scraping
  - Data Extraction
  - Screenshots
  - Proxies
  - Browser Automation
description: Scrapfly prices on a credit-based subscription model. A single API key shares one credit
  pool across all products (Scrape, Cloud Browser, Screenshot, Extraction, Crawler). Each plan bundles
  monthly credits and a maximum concurrency level. Free and Discovery plans hard-cap at quota; Pro and
  above auto-bill overage credits at tier-specific block rates.
sources:
  - https://scrapfly.io/pricing
plans:
  - id: scrapfly-free
    name: Free
    type: freemium
    description: Free tier with 1,000 credits and 5 concurrent requests; hard-capped on quota exhaustion.
    entries:
      - label: Monthly Credits
        name: monthly_credits
        type: quota
        metric: credits
        limit: 1000
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Concurrency
        name: concurrency
        type: quota
        metric: concurrent_requests
        limit: 5
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Web Scraping API
      - name: Cloud Browser API
      - name: Screenshot API
      - name: Extraction API
      - name: Crawler API
      - name: Hard cap on overflow
  - id: scrapfly-discovery
    name: Discovery
    type: subscription
    description: Entry paid plan at $30/month with 200,000 credits and 5 concurrency. Hard-capped on overflow;
      extra credits available in $5/10,000-credit blocks.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$30'
        userMultiplied: false
      - label: Monthly Credits
        name: monthly_credits
        type: quota
        metric: credits
        limit: 200000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Concurrency
        name: concurrency
        type: quota
        metric: concurrent_requests
        limit: 5
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Extra Credits
        name: extra_credits
        type: metered
        metric: credits
        limit: -1
        geo: global
        unit: 10000
        price: '$5.00'
        userMultiplied: false
    elements:
      - name: All Scrapfly Products
      - name: Hard cap on overflow
  - id: scrapfly-pro
    name: Pro
    type: subscription
    description: Pro plan at $100/month with 1,000,000 credits and 20 concurrency. Pay-as-you-go overflow
      enabled at $3.50/10,000-credit blocks.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$100'
        userMultiplied: false
      - label: Monthly Credits
        name: monthly_credits
        type: quota
        metric: credits
        limit: 1000000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Concurrency
        name: concurrency
        type: quota
        metric: concurrent_requests
        limit: 20
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Extra Credits
        name: extra_credits
        type: metered
        metric: credits
        limit: -1
        geo: global
        unit: 10000
        price: '$3.50'
        userMultiplied: false
    elements:
      - name: All Scrapfly Products
      - name: Pay-as-you-go overflow
  - id: scrapfly-startup
    name: Startup
    type: subscription
    description: Startup plan at $250/month with 2,500,000 credits and 50 concurrency. Pay-as-you-go overflow
      at $2.00/10,000-credit blocks.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$250'
        userMultiplied: false
      - label: Monthly Credits
        name: monthly_credits
        type: quota
        metric: credits
        limit: 2500000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Concurrency
        name: concurrency
        type: quota
        metric: concurrent_requests
        limit: 50
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Extra Credits
        name: extra_credits
        type: metered
        metric: credits
        limit: -1
        geo: global
        unit: 10000
        price: '$2.00'
        userMultiplied: false
    elements:
      - name: All Scrapfly Products
      - name: Pay-as-you-go overflow
  - id: scrapfly-enterprise
    name: Enterprise
    type: subscription
    description: Enterprise plan at $500/month with 5,500,000 credits and 100 concurrency. Pay-as-you-go
      overflow at $1.20/10,000-credit blocks.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$500'
        userMultiplied: false
      - label: Monthly Credits
        name: monthly_credits
        type: quota
        metric: credits
        limit: 5500000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Concurrency
        name: concurrency
        type: quota
        metric: concurrent_requests
        limit: 100
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Extra Credits
        name: extra_credits
        type: metered
        metric: credits
        limit: -1
        geo: global
        unit: 10000
        price: '$1.20'
        userMultiplied: false
    elements:
      - name: All Scrapfly Products
      - name: Pay-as-you-go overflow
  - id: scrapfly-custom
    name: Custom
    type: enterprise
    description: Custom plans negotiated for high-volume customers, ranging $1,200–$30,000+/month with
      negotiated credit pools, concurrency, and overflow rates.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$1,200–$30,000+'
        userMultiplied: false
      - label: Monthly Credits
        name: monthly_credits
        type: quota
        metric: credits
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: negotiated
        userMultiplied: false
      - label: Concurrency
        name: concurrency
        type: quota
        metric: concurrent_requests
        limit: -1
        geo: global
        unit: 1
        price: negotiated
        userMultiplied: false
      - label: Extra Credits
        name: extra_credits
        type: metered
        metric: credits
        limit: -1
        geo: global
        unit: 10000
        price: negotiated
        userMultiplied: false
    elements:
