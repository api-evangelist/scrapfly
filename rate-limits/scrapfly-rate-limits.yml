specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Scrapfly
providerId: scrapfly
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Web Scraping
  - Data Extraction
  - Rate Limiting
description: Scrapfly does not advertise per-second request limits. Throttling is enforced primarily through
  account-level concurrency caps (set by subscription tier) and credit-pool exhaustion. Per-domain throttling
  may also engage. The API surfaces concurrency and credit state in response headers, and returns 429
  when concurrency, free quota, or domain throttling is hit.
sources:
  - https://scrapfly.io/pricing
  - https://scrapfly.io/docs/scrape-api/getting-started
headers:
  accountConcurrentUsage: X-Scrapfly-Account-Concurrent-Usage
  accountRemainingConcurrentUsage: X-Scrapfly-Account-Remaining-Concurrent-Usage
  projectConcurrentUsage: X-Scrapfly-Project-Concurrent-Usage
  projectRemainingConcurrentUsage: X-Scrapfly-Project-Remaining-Concurrent-Usage
  apiCost: X-Scrapfly-Api-Cost
  remainingApiCredit: X-Scrapfly-Remaining-Api-Credit
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Free concurrency
    scope: account
    metric: concurrent_requests
    limit: 5
    notes: Applies to Free tier.
  - name: Discovery concurrency
    scope: account
    metric: concurrent_requests
    limit: 5
    notes: Applies to Discovery ($30/mo) tier.
  - name: Pro concurrency
    scope: account
    metric: concurrent_requests
    limit: 20
    notes: Applies to Pro ($100/mo) tier.
  - name: Startup concurrency
    scope: account
    metric: concurrent_requests
    limit: 50
    notes: Applies to Startup ($250/mo) tier.
  - name: Enterprise concurrency
    scope: account
    metric: concurrent_requests
    limit: 100
    notes: Applies to Enterprise ($500/mo) tier.
  - name: Custom concurrency
    scope: account
    metric: concurrent_requests
    limit: negotiated
    notes: Custom plans negotiate concurrency above 100.
  - name: Per-domain throttling
    scope: account/domain
    metric: varies
    limit: see Scrapfly throttling rules
    notes: Scrapfly may throttle a specific destination domain to protect target sites; surfaced as 429.
policies:
  - name: Concurrency-based throttling
    description: Subscription tier sets the maximum simultaneously open scrape requests. Excess requests
      are rejected with 429 rather than queued.
  - name: Credit pool overflow
    description: Free and Discovery plans hard-cap at the monthly credit quota. Pro and higher plans auto-bill
      overflow credits at tier-specific block rates ($1.20–$5.00 per 10,000 credits).
  - name: Backoff
    description: On 429 responses clients should back off and retry, monitoring X-Scrapfly-Account-Remaining-Concurrent-Usage
      to gauge headroom.
  - name: Project-scoped limits
    description: Concurrency can be sub-divided across Scrapfly Projects; project-level usage is reported
      via X-Scrapfly-Project-Concurrent-Usage.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
